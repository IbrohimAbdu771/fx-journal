{% extends "base.html" %}
{% block title %}Новая сделка — FX Journal{% endblock %}
{% block content %}
<h1>Новая сделка</h1>
<form class="card form" method="post" action="{{ action }}" enctype="multipart/form-data">
  <div class="card-h">Параметры сделки</div>
  {% include "_fields.html" %}
  <label class="wide">График при входе (Chart Before)
    <input type="file" name="chart_before" accept="image/*">
  </label>
  {% include "_result_fields.html" %}
  <div class="form-actions">
    <button class="btn btn-primary" type="submit">Сохранить</button>
    <a class="btn" href="/?mode={{ mode }}">Отмена</a>
  </div>
</form>
{% endblock %}
