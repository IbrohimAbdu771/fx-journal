<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — FX Journal</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
  <div class="bg" aria-hidden="true">
    <span class="glow glow-emerald"></span>
    <span class="glow glow-gold"></span>
    <span class="grain"></span>
  </div>
  <form class="login-card" method="post" action="/login">
    <img src="/static/logo.svg" alt="" style="width:54px;height:54px;margin:0 auto 4px">
    <h1 style="font-family:var(--font-display)">FX Journal</h1>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <div class="pw-wrap">
      <input type="password" name="password" id="pw" placeholder="Пароль" autofocus autocomplete="current-password">
      <button type="button" class="pw-toggle" id="pwToggle" aria-label="Показать пароль">
        <svg class="eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9.9 4.2A9.8 9.8 0 0 1 12 4c6.4 0 10 8 10 8a17 17 0 0 1-2.2 3.1M6.6 6.6A17 17 0 0 0 2 12s3.6 7 10 7a9.8 9.8 0 0 0 4.1-.9"/><path d="m4 4 16 16"/></svg>
      </button>
    </div>
    <button class="btn btn-primary" type="submit" style="justify-content:center">Войти</button>
  </form>
  <script>
    (function () {
      var pw = document.getElementById("pw"), t = document.getElementById("pwToggle");
      t.addEventListener("click", function () {
        var show = pw.type === "password";
        pw.type = show ? "text" : "password";
        t.classList.toggle("show", show);
        pw.focus();
      });
    })();
  </script>
</body>
</html>
