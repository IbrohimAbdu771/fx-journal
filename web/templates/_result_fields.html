{# Result group (Outcome / Result R / Result $). Expects: trade (dict|None) #}
{% from "_fields.html" import sel %}
{% set t = trade or {} %}
<div class="result-block">
  <div class="result-head">Результат</div>
  <div class="form-grid">
    <label>Outcome{{ sel('outcome', ict.OUTCOMES, t.get('outcome')) }}</label>
    <label>Result R<input name="result_r" type="text" inputmode="decimal" placeholder="напр. 1.8 или -1" value="{{ t.get('result_r') if t.get('result_r') is not none else '' }}"></label>
    <label>Result $<input name="result_usd" type="text" inputmode="decimal" value="{{ t.get('result_usd') if t.get('result_usd') is not none else '' }}"></label>
  </div>
</div>
