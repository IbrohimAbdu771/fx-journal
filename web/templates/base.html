<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FX Journal{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/app.js" defer></script>
</head>
{% set mode = mode|default('live') %}
<body class="mode-{{ mode }}">
  <div class="bg" aria-hidden="true">
    <span class="glow glow-emerald"></span>
    <span class="glow glow-gold"></span>
    <span class="grain"></span>
  </div>

  <header class="topbar">
    <a class="brand" href="/?mode={{ mode }}">
      <img src="/static/logo.svg" alt="" class="brand-mark">
      <span class="brand-word">FX&nbsp;<em>Journal</em></span>
    </a>
    <nav class="nav">
      <a href="/?mode=live" class="nav-link {{ 'active' if mode=='live' }}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12h4l2.5 7 5-14 2.5 7H21"/></svg>
        <span>Лайв</span>
      </a>
      <a href="/?mode=backtest" class="nav-link bt {{ 'active' if mode=='backtest' }}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 3h6M10 3v6l-5.2 9.3A2 2 0 0 0 6.6 21h10.8a2 2 0 0 0 1.8-2.7L14 9V3"/><path d="M7.5 15h9"/></svg>
        <span>Backtest</span>
      </a>
      <a href="/trades?mode={{ mode }}" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
        <span>Сделки</span>
      </a>
      <a href="/new?mode={{ mode }}" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        <span>Сделка</span>
      </a>
    </nav>
  </header>

  {% if mode == 'backtest' %}
  <div class="bt-ribbon-wrap">
    <span class="bt-ribbon">
      <svg class="flask" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 3h6M10 3v6l-5.2 9.3A2 2 0 0 0 6.6 21h10.8a2 2 0 0 0 1.8-2.7L14 9V3"/><path d="M7.5 15h9"/></svg>
      BACKTEST
      <em>тестовый журнал, отдельный от лайва</em>
    </span>
  </div>
  {% endif %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="foot">
    <span class="sig"></span> FX Journal — R-based ICT trading log
    <a href="/logout">выход</a>
  </footer>
</body>
</html>
